                    allOf:
                    - type: object
                      title: Last Modified By
                      properties:
                        id:
                          type: string
                          description: The ID of the user to last modify this item
                        username:
                          type: string
                          description: The Username of the user to last modify this
                            item
                        date:
                          type: string
                          nullable: true
                          format: date-time
                    - description: The last modified details of the Commission
                  commission_based_on_field:
                    type: string
                    description: The tracking field used to calculate partner commission
                  meta_fields:
                    type: array
                    items:
                      title: Meta Field Rules
                      allOf:
                      - $ref: '#/paths/~1v2~1campaigns~1%7BcampaignId%7D~1commissions~1promotions/post/requestBody/content/application~1json/schema/properties/meta_fields/items'
                      - type: object
                        properties:
                          rules:
                            type: array
                            items:
                              type: object
                              title: Meta Field Rule
                              description: Meta Field Rule with operator and values.
                              example:
                                operator: EQUALS
                                value: clothing
                              oneOf:
                              - title: Exact Match
                                properties:
                                  operator:
                                    description: Operator used to evaluate the meta
                                      field value is an exact match.
                                    type: string
                                    enum:
                                    - EQUALS
                                    example: EQUALS
                                  value:
                                    title: Meta Field Value
                                    description: Meta field matching value.
                                    type:
                                    - string
                                    - number
                              - title: Contains
                                properties:
                                  operator:
                                    description: Operator used to test the meta field
                                      value against part of a string or numeric value.
                                    type: string
                                    enum:
                                    - STARTS_WITH
                                    - ENDS_WITH
                                    - CONTAINS
                                    example: STARTS_WITH
                                  value:
                                    $ref: '#/paths/~1campaign~1%7BcampaignId%7D~1optimisation~1voucher~1commission/post/responses/200/content/application~1json/schema/properties/voucher_commission/properties/meta_fields/items/properties/rules/items/oneOf/0/properties/value'
                              - title: Comparison
                                properties:
                                  operator:
                                    description: Comparison operator used to test
                                      a numeric meta field value. Values are inclusive.
                                    type: string
                                    enum:
                                    - GREATER_THAN
                                    - LESS_THAN
                                    example: GREATER_THAN
                                  value:
                                    title: Meta Field Value
                                    description: Meta field matching value.
                                    type: number
                              - title: Between
                                properties:
                                  operator:
                                    description: Match the meta field value falls
                                      within the specified range.
                                    type: string
                                    enum:
                                    - BETWEEN
                                  value:
                                    description: The lower and upper bounds of the
                                      range as an array. Values are inclusive.
                                    minItems: 2
                                    maxItems: 2
                                    type: array
                                    items:
                                      title: Meta Field Value
                                      description: Meta field matching value.
                                      type: number
                                    example:
                                    - 0
                                    - 50
                              - title: One Of
                                properties:
                                  operator:
                                    description: Operator used to match against a
                                      set of values. The meta field value must exactly
                                      match one of the values in the array.
                                    type: string
                                    enum:
                                    - ONE_OF
                                  value:
                                    description: A list of values to match against.
                                    minItems: 1
                                    type: array
                                    items:
                                      title: Meta Field Value
                                      description: Meta field matching value.
                                      type: string
                                    example:
                                    - accessories
                                    - clothing
                                    - shoes
                              required:
                              - operator
                              - value
                        required:
                        - rules
