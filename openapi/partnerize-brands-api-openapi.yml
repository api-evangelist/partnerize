  /v3/brand/analytics/clicks/count:
    post:
      summary: Count
      description: 'Returns aggregated metrics derived from clicks.


        This endpoint is ideal for creating dashboard widgets, or for creating a summary
        of tabulated data from the explode endpoint.

        '
      operationId: postClicksCount
      tags:
      - Clicks
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-07/schema#
              type: object
              required:
              - date_time_ranges
              - scope
              - metrics
              properties:
                date_time_ranges:
                  allOf:
                  - type: array
                    items:
                      type: object
                      required:
                      - start
                      - end
                      properties:
                        start:
                          type: string
                          format: date-time
                        end:
                          type: string
                          format: date-time
                        field:
                          type: string
                          description: The date-time field that this date-time range
                            should use
                      additionalProperties: false
                    minItems: 1
                    description: Filter the results to given date-time ranges. You
                      can specify multiple date ranges and results for each date range
                      will be combined.
                  - items:
                      properties:
                        field:
                          $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1explode/post/requestBody/content/application~1json/schema/properties/interval/properties/field'
                comparison_date_time_ranges:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/date_time_ranges'
                scope:
                  description: Filter data by specified campaign identifiers. You
                    must have the correct authorisation to view reporting data on
                    these campaigns.
                  type: object
                  required:
                  - campaigns
                  properties:
                    campaigns:
                      type: array
                      items:
                        type: string
                      minItems: 1
                      uniqueItems: true
                  additionalProperties: false
                metrics:
                  allOf:
                  - type: array
                    minItems: 1
                    uniqueItems: true
                    description: Array of metrics which should be included in the
                      result.
                  - items:
                      type: string
                      enum:
                      - total_clicks
                      - total_clicks_converted
                      - click_conversion_rate
                      - total_unique_clicks
                filter_by:
                  allOf:
                  - type: array
                    description: A list of objects you can use to filter the results
                      by. Results will only be returned if they match every condition.
                    items:
                      type: object
                      required:
                      - field
                      - value
                      properties:
                        field:
                          type: string
                        value:
                          type:
                          - string
                          - integer
                          - array
                        operator:
                          type: string
                          default: EQUALS
                        not:
                          type: boolean
                      additionalProperties: false
                    minItems: 1
                  - items:
                      properties:
                        field:
                          type: string
                          enum:
                          - advertiser_reference
                          - browser_family
                          - browser_major
                          - browser_minor
                          - browser_patch
                          - campaign_id
                          - campaign_name
                          - country
                          - creative_id
                          - creative_description
                          - creative_advertiser_reference
                          - creative_tag_id
                          - device_id
                          - os_family
                          - os_major
                          - os_minor
                          - os_patch
                          - partner_group_id
                          - partner_id
                          - partner_name
                          - partnership_model_id
                          - traffic_source_id
                          - type
                          - user_context_id
                        operator:
                          type: string
                          enum:
                          - EQUALS
                          - STARTS_WITH
                          - ENDS_WITH
                          - CONTAINS
                          - SEARCH
                timezone:
                  description: See reference endpoint [/reference/timezones/](/#tag/Timezones)
                    for available timezones.
                  type: string
                include_comparison_percentage_change:
                  type: boolean
                  default: false
                  description: A boolean flag to indicate whether percentage changes
                    should be output when using comparison.
              additionalProperties: false
            example:
              date_time_ranges:
              - start: '2019-10-01T00:00:00+00:00'
                end: '2019-10-03T00:00:00+00:00'
              scope:
                campaigns:
                - 111111l10
              metrics:
              - total_clicks
              filter_by:
              - field: country
                value: US
                operator: EQUALS
              - field: device_id
                value: 5
                operator: EQUALS
                not: true
              timezone: GMT
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    example:
                      total_clicks: 57126
  /v3/brand/analytics/clicks/explode:
    post:
      summary: Explode
      description: 'Returns aggregated metrics derived from clicks, grouped by ID
        and name of one or many dimensions. This endpoint is ideal for

        fetching data to be shown in a table. You can combine it with the count endpoint
        to fetch data for a totals row.


        If `order_by` is requested on a metric, the metric values will be added to
        the results, even if not requested.


        When grouping by `date`, the `interval` will define the length of each date
        group.

        '
      operationId: postClicksExplode
      tags:
      - Clicks
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-07/schema#
              type: object
              required:
              - date_time_ranges
              - scope
              - metrics
              - group_by
              properties:
                date_time_ranges:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/date_time_ranges'
                comparison_date_time_ranges:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/date_time_ranges'
                scope:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/scope'
                metrics:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/metrics'
                group_by:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1filter/post/requestBody/content/application~1json/schema/properties/group_by'
                filter_by:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/filter_by'
                order_by:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1filter/post/requestBody/content/application~1json/schema/properties/order_by'
                interval:
                  allOf:
                  - description: To group the data into buckets of time. In the context
                      of Explode this is used when grouping by `date_time`
                    type: object
                    required:
                    - period
                    properties:
                      period:
                        type: string
                        pattern: ^P(?!$)(\d+Y)?(\d+M)?(\d+W)?(\d+D)?(T(?=\d+[HMS])(\d+H)?(\d+M)?(\d+S)?)?$
                        description: ISO8601 time interval value.
                        default: P1D
                      field:
                        type: string
                        description: The date-time field that should be used to group
                          each date interval
                    additionalProperties: false
                  properties:
                    field:
                      type: string
                      enum:
                      - date_time
                output_date_time_format:
                  type: string
                  description: Dates will be formatted with the Joda date format string
                    given. If no format is supplied here, ISO8601 format will be used.
                    For details of how to construct a format string, see https://www.joda.org/joda-time/apidocs/org/joda/time/format/DateTimeFormat.html
                top:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1filter/post/requestBody/content/application~1json/schema/properties/top'
                include_total_row_count:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1filter/post/requestBody/content/application~1json/schema/properties/include_total_row_count'
                timezone:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/timezone'
                include_comparison_percentage_change:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/include_comparison_percentage_change'
              additionalProperties: false
            example:
              date_time_ranges:
              - start: '2019-10-01T00:00:00+00:00'
                end: '2019-10-03T00:00:00+00:00'
              scope:
                campaigns:
                - 111111l10
              metrics:
              - total_clicks
              group_by:
              - device
              filter_by:
              - field: country
                value: US
                operator: EQUALS
              - field: device_id
                value: 5
                operator: EQUALS
                not: true
              order_by:
              - field: total_clicks
                direction: DESCENDING
              interval:
                field: date_time
                period: P1D
              include_total_row_count: false
              timezone: GMT
              top: 2
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    example:
                    - device_id: '1'
                      device_name: desktop
                      total_clicks: 2000
                    - device_id: '2'
                      device_name: mobile
                      total_clicks: 3000
          headers:
            X-Total-Row-Count:
              $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1filter/post/responses/200/headers/X-Total-Row-Count'
  /v3/brand/analytics/clicks/filter:
    post:
