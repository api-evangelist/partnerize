      parameters:
      - in: header
        name: X-Prefer
        schema:
          type: string
          enum:
          - return-synch
          - return-asynch
        required: false
      - in: path
        name: network_id
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                type: object
