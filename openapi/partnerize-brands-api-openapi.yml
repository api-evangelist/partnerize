                    split: true
                properties:
                  data:
                    type: object
                    properties:
                      code_suppression:
                        type: boolean
                        description: Is Code Suppression enabled?
                      preferred_partners:
                        type: boolean
                        description: Is Preferred Partners Enabled?
                      exclusive_codes:
                        type: boolean
                        description: Is Exclusive Codes enabled?
                      in_cart:
                        type: boolean
                        description: Is In-Cart enabled?
                      split:
                        type: boolean
                        description: Is Split enabled?
      operationId: get-v2-attribution
      description: Get the status of each of the Attribution Settings
    patch:
      summary: Update Attribution Settings
