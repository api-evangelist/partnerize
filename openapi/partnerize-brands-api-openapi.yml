      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: Attribution Response
                type: object
                description: Attribution Response Object
                example:
                  data:
                    code_suppression: false
                    preferred_partners: true
                    exclusive_codes: true
