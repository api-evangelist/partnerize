                      brand:
                        type: object
                        description: This Campaign's brand
                        properties:
                          id:
                            type: string
                            description: Unique identifier of a Brand
                            examples:
                            - 10l110
                          name:
                            type: string
                            description: Human readable name of a Brand
                            examples:
                            - PHG Aff
                          display_name:
                            type:
                            - string
                            - 'null'
                            description: Human readable display name of a Brand
                            examples:
                            - PHG Affiliations
                      extra_info:
