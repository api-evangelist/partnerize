                scope:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/scope'
                group_by:
                  allOf:
                  - type: array
                    minItems: 1
                    uniqueItems: true
                    description: Dimensions which the data should be grouped by.
                  - items:
                      type: string
                      enum:
                      - advertiser_reference
                      - browser_family
