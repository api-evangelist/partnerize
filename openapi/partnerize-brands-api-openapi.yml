                      - browser_minor
                      - browser_patch
                      - campaign
                      - country
                      - creative
                      - date_time
                      - device
                      - os_family
                      - os_major
                      - os_minor
                      - os_patch
                      - partner
                      - partnership_model
                      - traffic_source
                      - type
                      - user_context
                filter_by:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/filter_by'
                order_by:
                  allOf:
                  - type: array
                    description: Priority list of ordering objects
                    items:
                      type: object
                      required:
                      - field
                      - direction
                      properties:
                        field:
                          type: string
                        direction:
                          type: string
                          enum:
                          - ASCENDING
                          - DESCENDING
                      additionalProperties: false
                    minItems: 1
                  - items:
                      properties:
                        field:
                          type: string
                          enum:
                          - total_clicks
                          - total_clicks_converted
                          - click_conversion_rate
                          - total_unique_clicks
                          - advertiser_reference
                          - browser_family
                          - browser_major
                          - browser_minor
                          - browser_patch
                          - campaign_id
                          - campaign_name
                          - country
                          - country_name
                          - creative_id
                          - creative_description
                          - creative_advertiser_reference
                          - date_time
                          - device_id
                          - device_name
                          - os_family
                          - os_major
                          - os_minor
                          - os_patch
                          - partner_id
                          - partner_name
                          - partnership_model_id
                          - partnership_model_name
                          - traffic_source_id
                          - traffic_source_name
                          - type
                          - user_context_id
                          - user_context_name
                top:
                  type: integer
                  maximum: 50000
                  default: 50000
                  minimum: 1
                include_total_row_count:
                  type: boolean
                  default: false
                  description: A boolean flag to indicate whether an extra header
                    (X-Total-Row-Count) should be returned containing the total number
                    of rows. This can have a performance overhead so you should not
                    use it unless it is required.
                timezone:
                  $ref: '#/paths/~1v3~1brand~1analytics~1clicks~1count/post/requestBody/content/application~1json/schema/properties/timezone'
              additionalProperties: false
            example:
              date_time_ranges:
              - start: '2019-10-01T00:00:00+00:00'
                end: '2019-10-03T00:00:00+00:00'
              scope:
                campaigns:
                - 111111l10
              group_by:
              - device
              filter_by:
              - field: country
                value: US
                operator: EQUALS
              - field: device_id
                value: 5
                operator: EQUALS
                not: true
              order_by:
              - field: total_clicks
                direction: DESCENDING
              top: 2
              include_total_row_count: false
              timezone: GMT
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    example:
