      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-07/schema#
              type: object
              title: v3 Partial Update request
              properties:
                extra_info:
                  type: object
                  description: Any campaign extra_info to update. Key must be a supported
                    extra_info.
                  additionalProperties:
                    type: string
                  examples:
                  - shopify_shop_id: 123abc
      responses:
        '204':
          description: Success
