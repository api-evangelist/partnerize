                      additionalProperties: false
                  version:
                    type: integer
                    description: Commission version. Only applicable when requesting
                      V1 commissions.
                required:
                - id
                - description
                - start_date
                - end_date
                - last_modified
                - meta_fields
                - status
                - rates
