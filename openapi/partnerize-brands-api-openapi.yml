      description: Get Publishers for Network
  /v2/networks/{network_id}/publishers.csv:
    parameters:
    - in: header
      name: Accept
      schema:
        type: string
        enum:
        - charset=UTF-16
    - name: network_id
      description: The publishers' network id
      in: path
      required: true
      schema:
        type: string
    post:
      operationId: export-publishers
      description: Export publishers for a network
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              type: object
              properties:
                delimiter:
                  type: string
                  enum:
                  - ','
                  - '|'
                  - "\t"
                  default: ','
                excluded_publisher_id:
                  type: array
                  items:
                    type: string
                limit:
                  type: integer
                  default: 50000
                  maximum: 50000
                  description: 'Note: these default and maximum values only apply
                    when you are not emailing the result csv. When emailing the csv,
                    the default is `null` and there is no maximum limit'
                offset:
                  type: integer
                  default: null
                  nullable: true
                filter:
                  type: array
                  items:
                    anyOf:
                    - type: object
                      additionalProperties: false
                      required:
                      - property
                      - value
                      properties:
                        property:
                          enum:
                          - campaign_ids
                          - campaign_statuses
                          - commission_group_ids
                          - ids
                          - locales
                          - network_statuses
                          - operating_countries
                          - promotional_country
                          - promotional_method_ids
                          - vertical_id
                        value:
                          type:
                          - string
                          - array
                    - type: object
                      additionalProperties: false
                      required:
                      - property
                      - value
                      properties:
                        property:
                          enum:
                          - account_created
                          - company_name
                          - include_discovery
                          - search
                          - sort
                          - website_verified
                        value:
                          type: string
                email_result:
                  oneOf:
                  - type: string
                    minLength: 1
                    description: An email address of the email's recipient
                    format: email
                  - type: boolean
                    description: '''true'' sends email to the authenticated user.
                      ''false'' does not send an email and returns the csv contents
                      in the request response instead.'
                fields:
                  type: array
                  items:
                    type: string
                    enum:
                    - account_created
                    - campaigns
                    - company_name
                    - contact_email
                    - contact_name
                    - id
                    - instant_messaging
                    - locale
                    - metadata
                    - name
                    - network_id
                    - network_notes
                    - operating_country
                    - phone_number
                    - promotional_method
                    - reporting_identifier
                    - signup_ip
                    - vertical
                    - websites
                    - commission_groups
                    - website_info
      tags:
      - Publishers
      summary: Export publishers
      produces:
      - text/csv
      responses:
        '201':
          description: The list of filtered publishers
          content:
            text/csv:
              schema:
                type: string
              example: 'created_date,signup_ip,publisher_id,account_name,reporting_identifier,available_campaigns,approved_campaigns,invited_campaigns,requested_campaigns,rejected_campaigns,contact_name,contact_email,company_name,phone_area,phone,im_provider,im_username,operating_country,contact_locale,vertical_name,promotional_method_name,websites_website_url,website_verification_status,network_metadata_1,network_metadata_2,network_metadata_3

                "2019-10-30 11:08:41",80.80.80.80,111111l1,my_account,acc_reporting_id,"Campaign
                Avail","Campaign App A,Campaign App B","Campaign Inv","Campaign Req","Campaign
                Rej","Joe Bloggs",info@partnerize.com,"Partnerize",0191,12345678,Skype,jbskype,GB,en,Retail,PPC,http://www.partnerize.com,"https://partnerize.com
                :: verified | https://partner.com :: unverified","Network metadata
                1","Network metadata 2","Network metadata 3"

                '
        '202':
          description: When the exported report has been accepted and will be emailed
            to the user
        '400':
          description: Invalid filter property
          content:
            application/json:
              schema:
                $ref: '#/paths/~1v2~1networks~1%7Bnetwork_id%7D~1publishers/get/responses/400/content/application~1json/schema'
        '403':
          description: Unauthorised request
          content:
            application/json:
              schema:
                $ref: '#/paths/~1v2~1networks~1%7Bnetwork_id%7D~1publishers/get/responses/403/content/application~1json/schema'
