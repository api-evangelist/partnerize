                        required:
                        - links
                        properties:
                          pagination:
                            type: object
                            properties:
                              previous_page:
                                type: string
                                readOnly: true
                                description: The previous page in the result set.
                              next_page:
                                type: string
                                readOnly: true
                                description: The next page in the result set.
              examples:
                Incidents:
                  value:
                    limit: 1
                    cursor_id: 1234l12345678
                    incidents:
                    - id: 1234l12345678
                      metric: conversion_value
                      type: partner
                      date: '2019-11-01'
                      time_window: 1
                      partner:
                        id: 1001l1111
                        name: PZ Finance
                      status: active
                      created_at: '2020-04-01T00:00:00.000Z'
                      deleted_at: '2020-04-01T00:00:00.000Z'
                    hypermedia:
