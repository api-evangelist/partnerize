                      type: string
                      example: 0.08853 seconds
                - type: object
                  properties:
                    communications:
                      type: array
                      items:
                        $ref: '#/paths/~1v2~1communications~1%7Bid%7D/get/responses/200/content/application~1json/schema/allOf/1/properties/communication'
      operationId: get-communications
    post:
      tags:
      - Communications
      summary: Creates a new draft communication
      description: 'Draft communications belong to the user that created them (the
        owner).

        Note: this endpoint accepts publisher_ids or recipients, not both together

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/paths/~1v2~1communications~1%7Bid%7D~1content/put/requestBody/content/application~1json/schema'
              - type: object
                properties:
                  name:
                    type: string
                    maxLength: 64
                    example: Awesome communication
                  subject:
                    type: string
                    maxLength: 128
                    example: Wonderful subject
                  from_name:
                    type: string
                    maxLength: 64
                    description: The from name to be used
                    example: Joy O'Happy
                  from_email:
                    type: string
                    format: email
                    maxLength: 255
                    description: The from email to be used
                  reply_to_email:
                    type: string
                    format: email
                    maxLength: 255
                    description: The reply to email to be used
                  type:
                    type: string
                    enum:
                    - general
                    - prospect_invitation
                    default: general
                    description: The purpose of email being sent
                  campaigns:
                    type: array
                    maxItems: 180
                    uniqueItems: true
                    items:
                      type: string
              - $schema: http://json-schema.org/draft-04/schema
                oneOf:
                - type: object
                  properties:
                    recipients:
                      type: array
                      description: An array containing the emails of the recipients
                      items:
                        oneOf:
                        - type: string
                          format: email
                        - type: object
                          description: An object containing emails addresses and any
                            applicable metadata
                          required:
                          - email_address
                          properties:
                            email_address:
                              type: string
                              format: email
                            is_in_grouphigh:
                              type: boolean
                              description: Only available to emails of type prospect_invitation
                            is_in_publisher_discovery:
                              type: boolean
                              description: Only available to emails of type prospect_invitation
                - type: object
                  properties:
                    publisher_ids:
                      type: array
                      description: An array containing ids of partner recipients
                      items:
                        type: string
      responses:
        '201':
          description: The new Communication object
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/paths/~1v2~1communications/get/responses/200/content/application~1json/schema/allOf/0'
                - $schema: http://json-schema.org/draft-04/schema
                  type: object
                  properties:
                    communication:
                      allOf:
                      - $ref: '#/paths/~1v2~1communications~1%7Bid%7D/get/responses/200/content/application~1json/schema/allOf/1/properties/communication'
                      - $ref: '#/paths/~1v2~1communications/post/requestBody/content/application~1json/schema/allOf/2'
                - $schema: http://json-schema.org/draft-04/schema
                  type: object
                  properties:
                    hypermedia:
                      type: object
                      properties:
                        links:
                          type: object
                          properties:
                            content:
                              type: string
