  /v3/brand/participations/{participationId}/paid_search_violation:
    post:
      summary: Create a paid search violation
      description: Create a paid search violation time frame for a given participation
      tags:
      - Paid Search Violations
      parameters:
      - name: participationId
        in: path
        description: The ID of the participation that the paid search violation will
          be applied to
        required: true
        schema:
          type: string
          example: 1111l11
      requestBody:
        content:
          application/json:
            schema:
              properties:
                start_date_time:
                  type: string
                  format: date-time
                  example: '2024-10-10T12:01:00+00:00'
                  description: Datetime when the violation time window should start.
                    The field is optional and will default to the current datetime
                end_date_time:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2025-10-10T12:01:00+00:00'
                  description: Datetime when the violation time window should end.
                    The field is optional and will default 'null'. If this field is
                    'null' then all commissions for the participation after the 'start_date_time'
                    will not be paid to the partner
              additionalProperties: false
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 111111l1
                      participation_id:
                        type: string
                        example: 111111l1
                      start_date_time:
                        type: string
                        format: date-time
                        example: '2024-10-10T12:01:00+00:00'
                      end_date_time:
                        type: string
                        format: date-time
                        nullable: true
                        example: '2025-10-10T12:01:00+00:00'
    get:
      summary: List paid search violations
      description: Get a timeline of paid search violations for a given participation
      tags:
      - Paid Search Violations
      parameters:
      - name: participationId
        in: path
        description: The ID of the participation that the paid search violation is
          associated with
        required: true
        schema:
          type: string
          example: 1111l11
      responses:
        '200':
          description: Request Success
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-07/schema#
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/paths/~1v3~1brand~1participations~1%7BparticipationId%7D~1paid_search_violation/post/responses/201/content/application~1json/schema/properties/data'
  /v3/brand/participations/{participationId}/paid_search_violation/{paidSearchViolationId}:
    delete:
      summary: Delete a paid search violation
      description: Deletes or ends a paid search violation. If a paid search violation
        has been started but the end date has not elapsed, then the end date will
        be updated to the current datetime. If the paid search violation has not been
        started then the paid search violation will be completely deleted.
      tags:
      - Paid Search Violations
      parameters:
      - name: participationId
        in: path
        description: The ID of the participation that the paid search violation is
          associated with
        required: true
        schema:
          type: string
          example: 1111l11
      - name: paidSearchViolationId
        in: path
        description: The ID of the paid search violation that will be deleted
        required: true
        schema:
          type: string
          example: 1111l11
      responses:
        '204':
          description: Delete Successful
