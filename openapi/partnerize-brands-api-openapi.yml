      parameters:
      - $ref: '#/components/schemas/Publishers_V2_Filters/account_created'
      - $ref: '#/components/schemas/Publishers_V2_Filters/campaign_ids'
      - $ref: '#/components/schemas/Publishers_V2_Filters/campaign_statuses'
      - $ref: '#/components/schemas/Publishers_V2_Filters/commission_group_ids'
      - $ref: '#/components/schemas/Publishers_V2_Filters/company_name'
      - $ref: '#/components/schemas/Publishers_V2_Filters/fields'
      - $ref: '#/components/schemas/Publishers_V2_Filters/ids'
      - $ref: '#/components/schemas/Publishers_V2_Filters/include_discovery'
      - $ref: '#/components/schemas/Publishers_V2_Filters/website_verified'
      - $ref: '#/components/schemas/Publishers_V2_Filters/limit'
      - $ref: '#/components/schemas/Publishers_V2_Filters/locales'
      - $ref: '#/components/schemas/Publishers_V2_Filters/network_statuses'
      - $ref: '#/components/schemas/Publishers_V2_Filters/offset'
      - $ref: '#/components/schemas/Publishers_V2_Filters/operating_countries'
      - $ref: '#/components/schemas/Publishers_V2_Filters/partner_collection_id'
      - $ref: '#/components/schemas/Publishers_V2_Filters/promotional_countries'
      - $ref: '#/components/schemas/Publishers_V2_Filters/promotional_method_ids'
      - $ref: '#/components/schemas/Publishers_V2_Filters/publisher_email'
      - $ref: '#/components/schemas/Publishers_V2_Filters/publisher_name'
      - $ref: '#/components/schemas/Publishers_V2_Filters/publisher_tag_ids'
      - $ref: '#/components/schemas/Publishers_V2_Filters/publisher_website'
      - $ref: '#/components/schemas/Publishers_V2_Filters/reporting_identifier'
      - $ref: '#/components/schemas/Publishers_V2_Filters/search'
      - $ref: '#/components/schemas/Publishers_V2_Filters/sort'
      - $ref: '#/components/schemas/Publishers_V2_Filters/vertical_ids'
      - in: query
        name: recipient_status
        description: Accepts a communication ID. Adds a flag into the response whether
          publishers are on that communication's recipient list
        schema:
          type: string
          example: 111111l1
      responses:
        '200':
          description: The list of filtered publishers
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/paths/~1v2~1communications/get/responses/200/content/application~1json/schema/allOf/0'
                - type: object
                  properties:
                    count:
                      type: integer
                      example: 56
                    limit:
                      type: integer
                      example: 100
                    offset:
                      type: integer
                    publishers:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/paths/~1v2~1networks~1%7Bnetwork_id%7D~1publishers~1%7Bpublisher_id%7D/get/responses/200/content/application~1json/schema/allOf/0'
                        - type: object
                          properties:
