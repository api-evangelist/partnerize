                - success_count
                - failure_count
                properties:
                  success_count:
                    type: integer
                    examples:
                    - 1
                  failure_count:
                    type: integer
                    examples:
                    - 0
        '202':
          description: Accepted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/paths/~1v2~1networks~1%7Bnetwork_id%7D~1publishers~1ids/get/responses/400/content/application~1json/schema'
      operationId: post-v2-networks-network_id-invite-network-partners
      description: An Advertiser can invite one or more Network Partners to one or
        more Campaigns. The user must have manage participation permission over each
        campaign in the payload. The payload will be validated and invitations will
        be created only if all fields are valid. If a partner has already been invited
        or is approved on the campaign, the campaign will be skipped. If the partner
        has an existing request to join the campaign, the request will be resolved
        and the partner will be immediately approved on the campaign. Notifications
        will be sent according to each partner's preferences.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - properties:
                  partner_collection_id:
                    type: string
                  campaign_id:
                    type: array
                    items:
                      type: string
              - properties:
                  publisher_id:
                    type: array
                    items:
                      type: string
                  campaign_id:
                    type: array
                    items:
                      type: string
              - properties:
                  filter:
                    type: array
                    items: {}
                  campaign_id:
                    type: array
                    items:
                      type: string
                  excluded_publisher_id:
                    type: array
                    items:
                      type: string
              type: object
            examples:
              Collection based request:
                value:
                  partner_collection_id: 11111l1
                  campaign_id:
                  - 11111l21
                  - 11111l22
              Selection based request:
                value:
                  publisher_id:
                  - 11111l1
                  - 11111l2
                  campaign_id:
                  - 11111l21
                  - 11111l22
              Filter based request:
                value:
                  filter:
                  - property: search
                    value: cash
                  - property: vertical_id
                    value:
                    - '6'
                  - property: promo_method_id
                    value:
                    - '70'
                  - property: operating_country
                    value:
                    - US
                  - property: promotional_country
                    value:
                    - US
                  - property: campaign_id
                    value:
                    - 11111l90
                  - property: campaign_status
                    value:
                    - approved
                    - requested
                  campaign_id:
                  - 11111l21
                  - 11111l22
                  excluded_publisher_id:
                  - 11111l102
        description: 'Selection based requests simply require a list of Publisher
          and Campaign IDs. The server will create invitations from the combination
          of the two lists.


          Collection based requests require a partner collection creating first.


          Alternatively when inviting many Publishers at once, instead of listing
          every PublisherID, a filter based request allows the user to specify filters
          with which to match Publishers. You can exclude specific Publishers by listing
          their IDs using the `excluded_publisher_id` property.'
    get:
      summary: Display pending outcomes - invitations and approvals
      operationId: inviteDryRun
      description: List all potential invitations and approvals for given set of campaigns
      tags:
      - Campaign Requests and Invites
      parameters:
      - name: network_id
        in: path
        description: The network id
        required: true
      - in: query
        name: partner_collection_id
        required: true
        schema:
          type: string
      - in: query
        name: campaign_ids
        required: true
        schema:
          type: array
          items:
            type: string
      - in: query
        name: search
        required: false
        schema:
          type: string
      - in: query
        name: limit
        required: false
        schema:
          type: number
      - in: query
        name: offset
        required: false
        schema:
          type: number
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                type: object
                properties:
                  partners:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          examples:
                          - 1101l78103
                        name:
                          type: string
                          examples:
                          - Greatest Partner
                        company_name:
                          type: string
                          examples:
                          - Greatest Partner Inc.
                        campaigns:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                examples:
                                - 1101l78105
                              name:
                                type: string
                                examples:
                                - 'Campaign #1'
                              status:
                                type: string
                                examples:
                                - APPROVED
                                - INVITED
                              approval_date:
                                type: string
                                examples:
                                - '2022-01-01 00:00:00'
                                - 'null'
                        websites:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                examples:
                                - 1101l78105
                              website_url:
                                type: string
                                examples:
                                - https://partnerize.com
                              description:
                                type: string
                                examples:
                                - Description
                  count:
                    type: integer
                    examples:
                    - 3
                  limit:
                    type: integer
                    examples:
                    - 10
                  offset:
                    type: integer
                    examples:
                    - 0
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/paths/~1v2~1networks~1%7Bnetwork_id%7D~1publishers~1ids/get/responses/400/content/application~1json/schema'
