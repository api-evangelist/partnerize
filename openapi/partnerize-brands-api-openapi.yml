                              description: Error Message
                          required:
                          - type
                          - code
                          - message
                      message:
                        type: string
                        description: Status Message
                      code:
                        type: integer
                        description: Status Code
                required:
                - error
        '403':
          description: Unauthorised request
          content:
            application/json:
              schema:
                example:
                  error:
                    errors:
                    - type: error
                      code: unauthorised
                      message: You do not have 'read' permission on publisher with
                        id '1'
                    code: 403
                    message: Forbidden
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      errors:
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                            code:
                              type: string
                            message:
                              type: string
                      code:
                        type: integer
                      message:
                        type: string
