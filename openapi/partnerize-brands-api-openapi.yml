      description: Update an Exclusive Code. All request body properties are optional
        but at least one must be specified for update.
      tags:
      - Exclusive Code
      requestBody:
        content:
          application/json:
            schema:
              title: Exclusive Code Update Request
              type: object
              description: Update an exclusive code
              minProperties: 1
              properties:
                voucher_code:
                  oneOf:
                  - type: string
                    pattern: ^[a-zA-Z0-9_-]+$
                    minLength: 1
                    description: An exact match voucher code
                  - allOf:
                    - $ref: '#/paths/~1v2~1campaigns~1%7BcampaignId%7D~1attribution~1exclusive-codes/post/requestBody/content/application~1json/schema/properties/voucher_code/oneOf/1/allOf/0'
                    - $ref: '#/paths/~1v2~1campaigns~1%7BcampaignId%7D~1attribution~1exclusive-codes/post/requestBody/content/application~1json/schema/properties/voucher_code/oneOf/1/allOf/1'
                partner_id:
                  type: string
                  description: The ID of the Partner who will receive commission when
                    this voucher code is used.
                start_date:
                  type: string
                  format: date-time
                  description: The date from which the voucher code is valid. This
                    is inclusive.
                end_date:
                  description: The date until the voucher code is valid. This is inclusive.
                  type:
                  - string
                  - 'null'
                  format: date-time
                is_clickless:
                  type: boolean
                  description: Specifies if the Exclusive Code has Clickless Campaign
                    Based Reallocation behaviour. This setting only applies to Master
                    Campaign setups.
                  default: false
    delete:
      summary: Delete an Exclusive Code
      responses:
        '204':
          description: No Content
      operationId: delete-campaigns-campaignId-attribution-exclusive-codes-id
      description: Delete an Exclusive Code
      tags:
      - Exclusive Code
