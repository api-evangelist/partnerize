  /v2/networks/{networkId}/campaign-requests/accept:
    parameters:
    - name: networkId
      in: path
      description: ID of the network
      examples:
      - 1l1007802
      required: true
      schema:
        type: string
    post:
      summary: Accept Campaign Requests
      description: 'This endpont is now `Obsolete`. Use [Approve and Invite Partners
        to Campaigns](#tag/Campaign-Requests-and-Invites/operation/post-v2-networks-network_id-invite-network-partners)
        instead<br/><br/>

        An Advertiser may accept requests from Partners to join campaigns within their
        Network. This bulk endpoint allows a user to reject multiple requests in one
        call. The payload contains one or more campaign ID and partner ID pairs that
        uniquely identify each campaign request to accept.

        '
      operationId: accept-campaign-requests
      tags:
      - Campaign Requests and Invites
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              type: object
              required:
              - campaign_requests
              properties:
                campaign_requests:
                  type: array
                  items:
                    $schema: http://json-schema.org/draft-04/schema
                    type: object
                    required:
                    - campaign_id
                    - publisher_id
                    properties:
                      campaign_id:
                        type: string
                        examples:
                        - 726fl66778123
                      publisher_id:
                        type: string
                        examples:
                        - 6aedl83886767
                    additionalProperties: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                type: object
                title: Accept Campaign-Request Response
                required:
                - success_count
                - failure_count
                properties:
                  success_count:
                    type: integer
                    examples:
                    - 1
                  failure_count:
                    type: integer
                    examples:
                    - 0
  /v2/networks/{networkId}/campaign-requests/decline:
    parameters:
    - name: networkId
      in: path
      description: ID of the network
      examples:
      - 1l1007802
      required: true
      schema:
        type: string
    post:
      summary: Decline Campaign Requests
      description: 'An Advertiser may decline requests from Partners to join campaigns
        within their Network. This bulk endpoint allows a user to decline multiple
        requests in one call. The payload contains one or more campaign ID and partner
        ID pairs that uniquely identify each campaign request to decline. Each partner
        and campaign pair must include a decline "reason". Use null if no reason is
        provided.

        '
      operationId: decline-campaign-requests
      tags:
      - Campaign Requests and Invites
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              type: object
              required:
              - campaign_requests
              properties:
                campaign_requests:
                  type: array
                  items:
                    type: object
                    required:
                    - campaign_id
                    - publisher_id
                    - reason
                    properties:
                      campaign_id:
                        type: string
                        examples:
                        - 726fl66778123
                      publisher_id:
                        type: string
                        examples:
                        - 6aedl83886767
                      reason:
                        type: string
                    additionalProperties: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                type: object
                title: Decline Campaign-Request Response
                required:
