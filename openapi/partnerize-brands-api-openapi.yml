                custom_terms:
                - removed_associations: 1
        '207':
          description: Success
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema
                type: object
                title: Custom Terms Response
                allOf:
                - $ref: '#/paths/~1campaign~1%7Bcampaign_id%7D~1custom_terms~1/get/responses/200/content/application~1json/schema/allOf/0'
                - properties:
