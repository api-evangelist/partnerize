                            type: integer
                            description: Number of deleted entities
                - $ref: '#/paths/~1campaign~1%7Bcampaign_id%7D~1custom_terms~1%7Bcustom_terms_id%7D/delete/responses/404/content/application~1json/schema'
                additionalProperties: false
