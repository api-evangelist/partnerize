      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/paths/~1v2~1campaigns~1%7BcampaignId%7D~1attribution/get/responses/200/content/application~1json/schema'
      requestBody:
        content:
          application/json:
            schema:
              title: Attribution Update Request
              type: object
              description: Attribution Update Request Object
              properties:
                code_suppression:
                  type: boolean
                  description: Is Code Suppression enabled?
                preferred_partners:
                  type: boolean
                  description: Is Preferred Partners Enabled?
                exclusive_codes:
                  type: boolean
                  description: Is Exclusive Codes enabled?
                in_cart:
                  type: boolean
                  description: Is In-Cart enabled? Mutually exclusive with Split
