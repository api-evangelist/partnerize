    \ | This value is already used. |\n\n### Authorized (Code 401)\nIf there is an\
    \ error with your authentication credentials, you’ll receive a “401 Unauthorized”\
    \ http response. The body of the response will be JSON with the `errors` attribute\
    \ containing an array of details of the error(s).\n\n| Code | Description |\n\
    |--|--|\n| `39b4b7c2-e5b9-41b1-83d4-db3b23b5ebfa` | The authentication credentials\
    \ are missing or are an invalid `User application key` and `User API key` combination.\
    \ |\n\n**Sample JSON response body when no credentials has been supplied.**\n\
    ```\n{\n  \"error\": {\n    \"errors\": [\n      {\n        \"property\": \"\"\
    ,\n        \"message\": \"Your API credentials can be found in Account settings.\
    \ 'Username' will be your 'User application key' and 'Password' will be your 'User\
    \ API key'.\",\n        \"code\": \"39b4b7c2-e5b9-41b1-83d4-db3b23b5ebfa\",\n\
    \        \"type\": \"unauthorised\"\n      }\n    ],\n    \"message\": \"Unauthorized\"\
    ,\n    \"code\": \"401\"\n  }\n}\n```\n**Sample JSON response body when an invalid\
    \ `User application key` and `User API key` combination has been supplied.**\n\
    ```\n{\n  \"error\": {\n    \"errors\": [\n      {\n        \"property\": \"\"\
    ,\n        \"message\": \"Your 'User application key' and 'User API key' combination\
    \ is invalid.\",\n        \"code\": \"39b4b7c2-e5b9-41b1-83d4-db3b23b5ebfa\",\n\
    \        \"type\": \"unauthorised\"\n      }\n    ],\n    \"message\": \"Unauthorized\"\
    ,\n    \"code\": \"401\"\n  }\n}\n```\n\n### Forbidden (Code 403)\nIf there is\
    \ an denial of access to a resouce within your request, you’ll receive a “403\
    \ Forbidden“ http response. The body of the response will be JSON with the `errors`\
    \ attribute containing an array of details of the error(s).\n\n| Code | Description\
    \ |\n|--|--|\n| `76fb121a-d769-4293-852d-3b9b6a3dcce8` | Access has not been permitted\
    \ to a resource or to perform an action. |\n| `16bd7f4a-bf84-45c3-aa95-9b32aeb139b0`\
    \ | Access has not been permitted to a resource or to perform an action. |\n|\
    \ `f0b71be3-c8be-4ff2-893e-2bc7f7a18156` | There are terms and conditions that\
    \ need to be acknowledged before continuing. |\n\n```\n{\n  \"error\": {\n   \
    \ \"errors\": [\n      {\n        \"property\": \"[campaigns][0]\",\n        \"\
    message\": \"You do not have \\\"view\\\" access on this entity.\",\n        \"\
    code\": \"16bd7f4a-bf84-45c3-aa95-9b32aeb139b0\",\n        \"type\": \"unauthorised\"\
    \n      }\n    ],\n    \"code\": \"403\",\n    \"message\": \"Forbidden\"\n  }\n\
    }\n```\n\n### Not Found (Code 404)\nIf there is an error locating a requested\
    \ resource, you’ll receive a “404 Not Found\" http response. The body of the response\
    \ will be JSON with the `errors` attribute containing an array of details of the\
    \ error(s).\n\n| Code | Description |\n|--|--|\n| `0d528fb3-569c-45fa-b2b5-309b360bf9fa`\
    \ | A route has not been found to match the supplied URL. |\n\n**Sample JSON response\
    \ body when an invalid URL has been requested.**\n```\n{\n  \"error\": {\n   \
    \ \"errors\": [\n      {\n        \"property\": \"\",\n        \"message\": \"\
    No route found for \\\"POST \\/foo\\\"\",\n        \"code\": \"0d528fb3-569c-45fa-b2b5-309b360bf9fa\"\
    ,\n        \"type\": \"not_found\"\n      }\n    ],\n    \"message\": \"Not Found\"\
    ,\n    \"code\": \"404\"\n  }\n}\n```\n\n### Method Not Allowed (Code 405)\nIf\
    \ there is an error accessing a resource using the given HTTP verb, you’ll receive\
    \ a “405 Method Not Allowed“ http response. The body of the response will be JSON\
    \ with the `errors` attribute containing an array of details of the error(s).\n\
    \n| Code | Description |\n|--|--|\n| `5fe5c44b-f299-4fa6-bda4-bf80fecf6093` |\
    \ A route has been found which matches the supplied URL but cannot be accessed\
    \ via the HTTP verb. |\n\n**Sample JSON response body when an valid URL has been\
    \ requested with an invalid request method.**\n```\n{\n  \"error\": {\n    \"\
    errors\": [\n      {\n        \"property\": \"\",\n        \"message\": \"No route\
    \ found for \\\"POST \\/foo\\\": Method Not Allowed (Allow: GET)\",\n        \"\
    code\": \"5fe5c44b-f299-4fa6-bda4-bf80fecf6093\",\n        \"type\": \"routing_error\"\
    \n      }\n    ],\n    \"message\": \"Method Not Allowed\",\n    \"code\": \"\
    405\"\n  }\n}\n```\n\n### Too Many Requests (Code 429)\nThis error code indicates\
    \ that too many requests were sent within a period of time. See [Rate limits](#section/Common-API-Conventions/Rate-Limits)\
    \ for more information on this.\n\n\n**Sample JSON response body when a rate limit\
    \ is hit.**\n```\n    {\n      \"error\": {\n        \"errors\": [\n         \
    \ {\n            \"property\": \"\",\n            \"message\": \"You have made\
    \ too many requests recently, please try again later.\",\n            \"code\"\
    : \"3b22ff00-96a5-4fa4-96cc-f36e68dbd2e2\",\n            \"type\": \"too_many_requests\"\
    \n          }\n        ],\n        \"message\": \"Too Many Requests\",\n     \
    \   \"code\": \"429\"\n      }\n    }\n ```   \n\n### Internal System Error (Code\
    \ 500)\nIf there is an internal error, you’ll receive a “500 Internal Server Error“\
    \ http response. The body of the response will be JSON with the `errors` attribute\
    \ containing an array of details of the error(s).\n\n| Code | Description |\n\
    |--|--|\n| `a72717b1-0ecb-4d74-a77f-3e3702a2c8d5` | A non-specific error has occured.\
    \ |\n| `c2b63ca9-e15b-48ee-bcf0-0469a2f52047` | A connection to a remote service\
    \ could not be established, this could be related to an outage or an invalid request.\
    \ |\n| `03b1fdbe-ce8a-4de7-b850-b5e4bccf7f81` | A remote service encountered an\
    \ error, this could be related to an outage or an invalid request. |\n\n## Date\
    \ Time\n\n`v3` API endpoints use [ISO-8601](https://www.iso.org/iso-8601-date-and-time-format.html)\
    \ date time format.\n\n### Example:\n\n`2019-03-01T12:01:00+00:00` - this example\
    \ represents 1 minute past midday on the 1st of March 2019 in UTC.\n\n`2019-03-01`\
    \ - date only example\n"
