- term: Campaigns
  description: A Campaign is owned by a Brand and a Brand may have multiple Campaigns.
    A Campaign represents an entity which the Brand uses to represent something that
    they wish to allow Partners the chance to promote. A Campaign dictates what products/events/conversions
    can be promoted, and lets the Partners understand what Commission they would earn
    for generating sales/events/conversions. The Brand has complete control over their
    Campaigns and dictates which Partners they accept onto the Campaign to promote
    their services.
