- term: Introduction
  description: "The Analytics API provides access to our Analytical Data Platform;\
    \ it has an expressive easy to use request structure that allows you to write\
    \ fluent queries to access your data. There is up to 1000x speed improvement for\
    \ specific queries and operations compared to the legacy Reporting (v1) API and\
    \ allows for more in-depth insight into your data. The Analytics API also powers\
    \ the Analytics Reporting UI.\n\nThe below covers the core concepts of the Analytics\
    \ API, head over to the [Tutorials](#tag/Tutorials) section for more examples.\n\
    \n## Metrics and Dimensions \n\nAnalytics has two common data types `Dimension`\
    \ and `Metric`. Metrics are the quantitative measurements of data and dimensions\
    \ are the labels used to describe them—or, in even easier terms: numeric values\
    \ always express metrics while non-numerical values express dimensions. An example\
    \ in the context of Analytics, `total_clicks` would be a metric and `country`\
    \ would be a dimension, an in-depth explanation into each is below.\n\n\n### Metrics\n\
    \nAll endpoints allow you to return one or more metrics, except for the `filter`\
    \ endpoint, which will only return metrics if you sort by a metric.\n\n\nYou can\
    \ supply a single metric:\n\n```\n\"metrics\": [\"total_clicks\"]\n\n```\n\nOr\
    \ multiple metrics:\n\n```\n\"metrics\": [\"total_clicks\", \"total_clicks_converted\"\
    ]\n\n```\nYou should request multiple metrics in one request rather than making\
    \ multiple requests where possible. The metrics will be returned in the response\
    \ object in the same casing they are supplied.\n\n\n#### Metric Approximation\n\
    \nFor performance reasons, we apply approximations by default to a small set of\
    \ metric types; this is similar to how Google Analytics uses sampling techniques\
    \ for aggregated metrics to improve performance.\n\nCurrently, approximations\
    \ are applied to the Click Metrics; the metrics that are approximated are `total_unique_clicks`.\
    \ Furthermore, you'll be able to identify which metrics are approximated by looking\
    \ at the `X-Approximate-Metrics` response header.\n\nAll financial metrics, such\
    \ as `total_commission` and `total_partner_commission` are never approximated.\n\
    \n\n\n### Dimensions\n\nAs mentioned above, a dimension is a non-numeric value.\
    \ All endpoints support the ability to filter by a dimension, see the \"Filtering\"\
    \ section below. The \"Explode\" and \"Filter\" endpoints support the ability\
    \ to return the dimension values. \n\n## Data Sources and Endpoint Types\n\nIn\
    \ Analytics there are three datasources:\n\n1. Clicks\n2. Conversions - Including\
    \ Conversion Items\n3. Impressions\n\n\nand there are 4 endpoint types:\n\n1.\
    \ Count\n2. Explode\n3. Timeseries\n4. Filter\n\n\n### Count \n\nA count endpoint\
    \ can return one or multiple metrics, useful to present top-level figures used\
    \ on Dashboards, for example.\n\n### Explode\n\nThe explode endpoint returns metrics\
    \ grouped either by date or multiple dimensions (see the [Tutorials](#tag/Tutorials)\
    \ for an example). It's called explode as it's 'Exploding' the data out, using\
    \ a tabular format as an example it allows for grouping the data like the following:\n\
    \n\n```\n+-------------+---------------+---------+----------+-------------------+------------------+\n\
    | campaign_id | campaign_name | country | currency | total_order_value | total_commission\
    \ |\n+-------------+---------------+---------+----------+-------------------+------------------+\n\
    | 1           | Japan         | JP      | JPY      | 500               | 120.31\
    \           |\n+-------------+---------------+---------+----------+-------------------+------------------+\n\
    | 2           | Japan         | GB      | USD      | 400               | 50.12\
    \            |\n+-------------+---------------+---------+----------+-------------------+------------------+\n\
    | 3           | US            | US      | USD      | 300               | 31.13\
    \            |\n+-------------+---------------+---------+----------+-------------------+------------------+\n\
    | 4           | Italy         | IT      | EUR      | 200               | 90.00\
    \            |\n+-------------+---------------+---------+----------+-------------------+------------------+\n\
    ```\n\nNote that the explode endpoint doesn't support zero filling, meaning that\
    \ if there is no data for a particular record it will be excluded from the resulting\
    \ response instead of being included with zero values. \n\n### Timeseries\n\n\
    The Time series endpoints allow you to obtain metrics over intervals in time and\
    \ ordered chronologically. Timeseries calls are performant and are great for powering\
    \ plot style charts. One or multiple metrics can be requested with time series;\
    \ however, it can only ever be grouped by a date-time. \n\n### URI Structures\n\
    \   \nThe data source to use is embedded the the URI, with the following format:\n\
    \n```\n/v3/brand/analytics/<data-source>/<endpoint>\n```\n\nFor example, the URI\
    \ for using `explode` on the `conversions` data source would be:\n\n```\n/v3/brand/analytics/conversions/explode\n\
    ```\n\nIt isn't possible to retrieve data belonging to multiple data sources in\
    \ one endpoint call. So for example, to get the total number of clicks and the\
    \ total number of conversions, two API calls will need to be made to both the\
    \ `conversion` and `click` data sources.\n\n## Explode - Group By Dimension Response\
    \ Values\n\nWhen using the Explode Endpoint and grouping by particular dimensions\
    \ in some instances, you will be returned both an `_id` and `_name` for the dimension,\
    \ while others return only the dimension. See the full list of return properties\
    \ below:\n\n\n| Dimension            | Return Properties                     \
    \       |\n|----------------------|----------------------------------------------|\n\
    | advertiser_reference | advertiser_reference                         |\n| browser_family\
    \       | browser_family                               |\n| browser_major    \
    \    | browser_major                                |\n| browser_minor       \
    \ | browser_minor                                |\n| browser_patch        | browser_patch\
    \                                |\n| campaign             | campaign_id, campaign_name\
    \                   |\n| category             | category                     \
    \                |\n| conversion_metric    | conversion_metric_id, conversion_metric_name\
    \ |\n| conversion_reference | conversion_reference                         |\n\
    | conversion_status    | conversion_status                            |\n| conversion_type\
    \      | conversion_type_id, conversion_type_name     |\n| country           \
    \   | country                                      |\n| currency             |\
    \ currency                                     |\n| customer_type        | customer_type\
    \                                |\n| date_time            | date_time       \
    \                             |\n| device               | device_id, device_name\
    \                       |\n| os_family            | os_family                \
    \                    |\n| os_major             | os_major                    \
    \                 |\n| os_minor             | os_minor                       \
    \              |\n| os_patch             | os_patch                          \
    \           |\n| partner              | partner_id, partner_name             \
    \        |\n| partnership_model    | partnership_model_id, partnership_model_name\
    \ |\n| sku                  | sku                                          |\n\
    | traffic_source       | traffic_source_id, traffic_source_name       |\n| type\
    \                 | type                                         |\n| user_context\
    \         | user_context_id, user_context_name           |\n| voucher_code   \
    \      | voucher_code                                 |\n| voucher_status    \
    \   | voucher_status                               |\n\n\n## Request Structure\n\
    \nThis section outlines the commonality of the request structures between all\
    \ endpoints.\n\n\n### Scope\n\nA scope is used to specify the `campaign` ID's\
    \ that you wish to filter by.  \n\n\n```\n\"scope\": {\n  \"campaigns\": [\"1\"\
    , \"2\"],\n}\n\n```\n\nThe example above will first check you have access to campaign\
    \ ID's `1` and `2`. If you do have access, you will receive results for those\
    \ two campaigns.\n\nIf you do not have access to one or more requested `campaigns`\
    \ you will receive a `403 Forbidden` response.\n\nPlease see the [Tutorials](#tag/Tutorials)\
    \ section for an example of how to filter by partners.\n\n### Date Time Ranges\n\
    \nFor each call, you are required to provide a date-time range. You can specify\
    \ multiple date ranges if you like which operate on an `_OR_` basis, rather than\
    \ an `_AND_` basis.\n\nYou can specify a single range:\n\n```\n\"date_time_ranges\"\
    : [\n  {\n    \"start\": \"2020-10-0T00:00:00\",\n    \"end\": \"2020-10-31T23:59:59\"\
    \n  }\n]\n```\n\nAlternatively, you could specify multiple ranges; this example\
    \ would give you results for Black Fridays for the past three years:\n\n```\n\
    ...\n\"date_time_ranges\": [\n  {\n    \"start\": \"2017-11-24T00:00:00\",\n \
    \   \"end\": \"2017-11-24T23:59:59\"\n  },\n  {\n    \"start\": \"2018-11-23T00:00:00\"\
    ,\n    \"end\": \"2018-11-23T23:59:59\"\n  },\n  {\n    \"start\": \"2019-11-29T00:00:00\"\
    ,\n    \"end\": \"2019-11-29T23:59:59\"\n  }\n]\n...\n```\n\n### Top\n\nThe `top`\
    \ property is used to limit the number of results. If not specified it defaults\
    \ to `10000` results and there is an upper limit of `50000`.\n`10000` should be\
    \ sufficient to group your data day, publisher and campaign over one month.\n\n\
    ### Filtering\n\nThe API supports filtering by multiple dimensions supporting\
    \ multiple operations. Filters operate on the `_AND_` basis and can be compounded.\
    \ \n\nThe below is an example filtering conversions where the device is a desktop\
    \ `AND` the country is `EQUAL` to US `AND` the currency is `NOT EQUAL` to GBP.\n\
    \n```\n\n\"filter_by\": [\n  {\n    \"field\": \"device_id\",\n    \"value\":\
    \ \"2\"\n  },\n  {\n    \"field\": \"country\",\n    \"value\": \"US\"\n  }\n\
    \  {\n    \"field\": \"currency\",\n    \"value\": \"GBP\",\n    \"not\": true\n\
    \  }\n]\n```\n\n\nCurrently filtering by metrics is not yet supported.\n\n####\
    \ Property Filter Values\n\n##### Reference Endpoints\n\nBelow is a map of the\
    \ properties that have reference endpoints. You can use these to find the available\
    \ values to filter by.\n\n\n| Name                 | Reference Endpoint      \
    \                                 |\n|----------------------|----------------------------------------------------------|\n\
    | conversion_metric_id | [/reference/conversion_metric/](#tag/Conversion-Metrics)\
    \ |\n| conversion_type_id   | [/reference/conversion_type/](#tag/Conversion-Types)\
    \     |\n| country              | [/reference/country/](#tag/Countries)      \
    \              |\n| currency             | [/reference/currency/](#tag/Countries)\
    \                   |\n| device_id            | [/reference/devices/](#tag/Devices)\
    \                     |\n| partnership_model_id | [/reference/partnership_model/](#tag/Partnership-Models)\
    \ |\n| traffic_source_id    | [/reference/traffic_source/](#tag/Traffic-Sources)\
    \       |\n| user_context_id      | [/reference/user_context/](#tag/User-Contexts)\
    \           |\n\n\n##### Other\n\nBelow is a map of available values to filter\
    \ by for properties that *do* not have reference endpoints.\n\n###### `conversion_status`\n\
    \n```\napproved\npending\nrejected\n```\n\n###### `voucher_status`\n\n```\nexpired\n\
    ignored\ninvalid\nunknown\nvalid\n```\n\n\n### Timezones\n\nYou can set the timezone\
    \ by using the `timezone` property. The list of supported timezones can be found\
    \ using the reference API endpoint; see [/reference/timezone/](#tag/Timezones).\n\
    \n\n```\n\"timezone\": \"CET\"\n\n```\n\n\nYou should see this timezone reflected\
    \ in the offset of the date-times in the response whenever you group by date,\
    \ or use the `time-series` endpoint.\n\n\n```\n{\n  \"date\": \"2020-04-03T00:00:00+02:00\"\
    ,\n}\n```\n\nTimezone offsets such as `2020-05-01T00:00:00+02:00` will be ignored\
    \ and the `timezone` property must be used instead.\n\n\n### Custom Request and\
    \ Response Headers\n\n| Name                  | Type     | Description       \
    \                                                                            \
    \                                                                            \
    \                                      |\n|-----------------------|----------|-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | X-Total-Row-Count     | Response | Returns the total number of rows for the\
    \ given request, used  within the context of the Explode endpoint. This has to\
    \ be requested  in the JSON body of the request setting `include_total_row_count`\
    \ to `true` |\n| X-Approximate-Metrics | Response | Returns a list of metrics\
    \ that are approximated - see the  Metric Approximation section above.       \
    \                                                                            \
    \                               |\n\n\n \n## Currency Conversion\n\nIf you ask\
    \ for a currency based metric, `total_order_value`, for example, you should also\
    \ specify an `output_currency` using the ISO 4217 format. If you don't provide\
    \ an output currency, it will default to `USD`. Currently, the API only supports\
    \ one currency output per request. The list of supported currencies can be found\
    \ using the reference API endpoint; see [/reference/currencies/](/#tag/Currencies).\n\
    \n\n```\n\"output_currency\": \"GBP\"\n```\n\nThe exchange rate used is the exchange\
    \ rate for the given day of the API call. This means that between day to day usage,\
    \ you will experience fluctuations in the financial totals due to changing exchange\
    \ rates.\n\n\n## Rate-limiting\n\nTo ensure the reliability of our Analytics Platform\
    \ and to ensure it remains stable for all our clients, the Analytics API is rate-limited.\
    \ Analytics API uses its own rate-limiting algorithm and allowance, which is separate\
    \ from the rest of the Partnerize API endpoints. Its rate-limiting error responses\
    \ are the same as the standard error response for v3 endpoints. See the [Rate\
    \ Limits](#section/Common-API-Conventions/Rate-Limits) section for details.\n\n\
    The query costs are calculated based upon the endpoint and the date-time range\
    \ that is requested. The breakdown of these is shown below.\n\n| Date Range |\
    \ Explode | Count | Time Series | Filter |\n|------------|---------|-------|-------------|--------|\n\
    | < 1 Year   | 3       | 2     | 2           | 3      |\n| 1+ Year    | 5    \
    \   | 3     | 3           | 5      |\n| 2+ Year    | 10      | 4     | 4     \
    \      | 6      |\n| 3+ year    | 12      | 5     | 5           | 7      |\n|\
    \ 4+ year    | 15      | 6     | 6           | 8      |\n\n\n\nAs an example,\
    \ if you are requesting 2+ years of data from the Explode endpoint that would\
    \ allow you to make a total of 6 API calls over a period of 60 seconds.\n\n**Rate\
    \ Limits costs and quotas are continually reviewed. These can either increased\
    \ or decreased based upon the following criteria, the volume of data for your\
    \ account, to ensure platform stability or to accommodate functionality changes\
    \ within the API. We, therefore, recommend that your code has the appropriate\
    \ error handling and logging to accommodate for such changes.**\n\n\n### Recommendations\n\
    \nTo avoid being throttled, it's best to design your API integration using best\
    \ practices:\n\n- Only request the data that your integration requires.\n- Implement\
    \ caching for data that your integration uses often.\n- Ensure that your code\
    \ has appropriate error handling and respecting the `X-RateLimit-Retry-After`\
    \ header to ensure your code doesn't keep trying to make requests.\n- Modulate\
    \ the rate of requests, whilst the API caters for bursty traffic, respecting the\
    \ request limits will increase the stability of your integration.\n"
  source: brands-api-tag
