- term: Campaign Transaction Queries
  description: 'Transaction Queries (TQs) allow Partners to raise disputes about conversions
    with a Brand.

    There are three types of Transaction Queries:

    - Untracked: A conversion has not been tracked.

    - Incorrect Commission: A conversion does not have the correct Partner commission
    value.

    - Declined: The Brand has rejected a conversion.'
